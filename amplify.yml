# Configuración de build para AWS Amplify Hosting (monorepo pnpm).
# En la consola de Amplify: marcar "My app is a monorepo" con app root = apps/web.
version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9 --activate
            # pnpm usa symlinks que el empaquetador de Amplify no sigue; "hoisted"
            # crea node_modules reales para que el runtime encuentre "next".
            # (Solo afecta al build en Amplify; el .npmrc no está en el repo.)
            - echo "node-linker=hoisted" > ../../.npmrc
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
