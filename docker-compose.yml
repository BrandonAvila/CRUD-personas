# MySQL local para desarrollo. El esquema (apps/api/sql/schema.sql) se ejecuta
# automáticamente la primera vez que se crea el volumen.
# Se expone en el puerto 3307 del host para no chocar con un MySQL local en 3306.
services:
  mysql:
    image: mysql:8.0
    container_name: crud_personas_mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: crud_personas
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./apps/api/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-padmin123"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
