# Alternativa IaC con AWS SAM (opcional). El camino "manual" por consola
# está documentado en docs/DEPLOY_AWS.md.
#
# Prerrequisitos:
#   1. AWS SAM CLI instalado y credenciales configuradas (aws configure).
#   2. Empaquetar el código:  pnpm package:lambda   (genera dist/lambda/)
#   3. Desplegar:
#      sam deploy --guided --template infra/template.yaml \
#        --parameter-overrides DbHost=<endpoint-rds> DbUser=admin DbPassword=<pass>
#
# La base de datos RDS se crea aparte (ver docs/DEPLOY_AWS.md, paso 1).
#
# Incluye Cognito: las rutas /api/* exigen un JWT (header Authorization: Bearer);
# /health queda pública. Tras el despliegue, crea un usuario de prueba con:
#   aws cognito-idp admin-create-user --user-pool-id <UserPoolId> \
#     --username <email> --temporary-password <Pass123!> --message-action SUPPRESS

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Microservicio CRUD de personas (API Gateway HTTP API + Cognito JWT + Lambda + RDS MySQL externa)

Parameters:
  DbHost:
    Type: String
    Description: Endpoint de la instancia RDS MySQL
  DbPort:
    Type: String
    Default: '3306'
  DbUser:
    Type: String
    Default: admin
  DbPassword:
    Type: String
    NoEcho: true
  DbName:
    Type: String
    Default: crud_personas

Resources:
  # ---------- Cognito: user pool + app client (SPA, sin secret) ----------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: crud-personas-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: crud-personas-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours

  # ---------- API Gateway HTTP API con authorizer JWT ----------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - content-type
          - authorization
      Auth:
        Authorizers:
          CognitoJwt:
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
              audience:
                - !Ref UserPoolClient
            IdentitySource: $request.header.Authorization

  # ---------- Lambda ----------
  ApiPersonasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: api-personas
      CodeUri: ../dist/lambda
      Handler: src/lambda.handler
      Runtime: nodejs22.x
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
          DB_NAME: !Ref DbName
          DB_POOL_SIZE: '2'
      Events:
        Salud:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/{proxy+}
            Method: ANY
            Auth:
              Authorizer: CognitoJwt
        # Los preflight CORS (OPTIONS) no llevan token: sin esta ruta explícita
        # caerían en el authorizer del ANY y el navegador recibiría 401.
        # Express (middleware cors) responde el preflight con 204.
        Preflight:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/{proxy+}
            Method: OPTIONS
      # La Lambda corre dentro de la VPC por defecto; el SG de RDS solo acepta
      # 3306 desde este SG (no hay acceso público a la BD desde internet).
      VpcConfig:
        SecurityGroupIds:
          - sg-0693910e7dd44eb5c
        SubnetIds:
          - subnet-0007b7b557fe1adac
          - subnet-00f9cf68327efa659

Outputs:
  ApiUrl:
    Description: URL base del microservicio (usar como baseUrl en Postman)
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UserPoolId:
    Description: Id del user pool de Cognito (para crear usuarios)
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Client ID (audience del JWT; úsalo para obtener tokens)
    Value: !Ref UserPoolClient
